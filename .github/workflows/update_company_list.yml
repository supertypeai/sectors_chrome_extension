name: Update Active Company List

on:
  schedule:
    # Run every 2 weeks (on the 1st and 15th of every month at midnight UTC)
    - cron: '0 0 1,15 * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f github_workflow/github_workflow_requirements.txt ]; then
            pip install -r github_workflow/github_workflow_requirements.txt
          else
            pip install supabase python-dotenv requests
          fi

      - name: Run update script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python github_workflow/update_active_company_list.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add active_companies.json
          # Check if there are changes before committing to avoid errors
          if git diff --cached --quiet; then
            echo "No changes in active company list."
          else
            git commit -m "chore: auto-update active company list [skip ci]"
            git push
          fi
