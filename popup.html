<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sectors IDX Lens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png" />
</head>
<body>
  <div class="popup-wrap">
    <!-- Header -->
    <div class="popup-header">
      <div class="brand">
        <img src="icons/android-chrome-192x192.png" class="brand-logo" alt="Sectors Logo" style="width: 24px; height: 24px;" />
        <div class="brand-text">
          <span class="brand-name">Sectors</span>
          <span class="brand-sub">IDX Ticker Lens</span>
        </div>
      </div>
      <button class="settings-btn" id="btn-settings" title="Open Settings">Settings</button>
    </div>

    <!-- API key status -->
    <div id="key-status" class="key-status key-missing hidden">
      <span class="key-status-icon"></span>
      <span>No API key set</span>
      <button class="btn-small" id="btn-set-key">Add Key</button>
    </div>
    <div id="key-ok" class="key-status key-set hidden">
      <span class="key-status-icon">✓</span>
      <span>Sectors API Connected</span>
    </div>

    <!-- Quick Lookup -->
    <div class="section">
      <div class="section-label">Quick Lookup</div>
      <div class="search-row">
        <input
          type="text"
          id="ticker-input"
          class="ticker-input"
          placeholder="e.g. BBCA, TLKM, BMRI"
          maxlength="10"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-search" id="btn-search">Search</button>
      </div>
    </div>

    <!-- Result area -->
    <div id="result-area" class="result-area hidden">
      <div id="result-content"></div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span>Hover any IDX ticker on a page for instant data</span>
      <a href="https://docs.sectors.app/" target="_blank" class="footer-link">API Docs</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
