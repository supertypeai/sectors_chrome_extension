<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sectors Ticker Lens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/vars.css" />
  <link rel="stylesheet" href="popup.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="../icons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../icons/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../icons/apple-touch-icon.png" />
  <script src="../scripts/theme-check.js"></script>
</head>
<body>
  <div class="popup-wrap">
    <!-- Header -->
    <div class="popup-header">
      <div class="brand">
        <img src="../icons/android-chrome-192x192.png" class="brand-logo" alt="Sectors Logo" style="width: 24px; height: 24px;" />
        <div class="brand-text">
          <span class="brand-name">Sectors</span>
          <span class="brand-sub">Ticker Lens</span>
        </div>
      </div>
      <button class="settings-btn" id="btn-settings" title="Open Settings">Settings</button>
    </div>

    <!-- API key status -->
    <div id="key-status" class="key-status key-missing hidden">
      <span class="key-status-icon"></span>
      <span>No API key set</span>
      <button class="btn-small" id="btn-set-key">Add Key</button>
    </div>
    <div id="key-ok" class="key-status key-set hidden">
      <span class="key-status-icon">✓</span>
      <span>Sectors API Connected</span>
    </div>

    <!-- Quick Lookup -->
    <div class="section">
      <div class="section-label">Quick Lookup</div>
      <div class="search-row">
        <input
          type="text"
          id="ticker-input"
          class="ticker-input"
          placeholder="e.g. BBCA, TLKM or D05.SI"
          maxlength="10"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn-search" id="btn-search">Search</button>
      </div>
    </div>

    <!-- Result area -->
    <div id="result-area" class="result-area hidden">
      <div id="result-content"></div>
    </div>

    <!-- Personalization -->
    <div class="section personalization-section">
      <div class="section-label">Personalization</div>
      <div class="pref-row">
        <div class="pref-info">
          <div class="pref-name">Enable hover tooltip</div>
          <div class="pref-desc">Show popup when hovering tickers</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="pref-enabled" checked />
          <span class="toggle-knob"></span>
        </label>
      </div>
      <div class="pref-row">
        <div class="pref-info">
          <div class="pref-name">Midnight Mode</div>
          <div class="pref-desc">Switch between Dark and Light</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="pref-theme-toggle" />
          <span class="toggle-knob"></span>
        </label>
      </div>
      <div class="pref-row">
        <div class="pref-info">
          <div class="pref-name">Hover delay</div>
          <div class="pref-desc" id="delay-val">120 ms</div>
        </div>
        <input type="range" id="pref-delay" min="50" max="600" step="50" value="120" class="pref-slider" />
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <span>Hover any ticker</span>
      <a href="https://docs.sectors.app/" target="_blank" class="footer-link">API Docs</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
